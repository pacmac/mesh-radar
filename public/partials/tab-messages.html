        <!-- ===================== MESSAGES ===================== -->
        <div x-show="tab==='messages'" class="grid grid-cols-1 lg:grid-cols-2 gap-4 flex-1 min-h-0">
          <div class="card bg-base-100 shadow flex flex-col min-h-0">
            <div class="card-body flex flex-col min-h-0">
              <h2 class="card-title shrink-0">Send Text</h2>
              <div class="flex flex-col gap-3 overflow-y-auto flex-1 min-h-0">

                <!-- From device (hidden when only 1) -->
                <div x-show="availableDevices.length > 1" class="flex items-center gap-2">
                  <span class="text-xs text-base-content/60 w-12 shrink-0">From</span>
                  <div class="join">
                    <template x-for="dev in availableDevices" :key="dev.addr">
                      <button class="join-item btn btn-xs"
                              :class="msgFrom === dev.node_id ? 'btn-primary' : 'btn-outline'"
                              @click="msgFrom = dev.node_id; persistSet('msgFrom', dev.node_id)"
                              x-text="deviceLabel(dev.node_id)"></button>
                    </template>
                  </div>
                </div>

                <!-- Broadcast / Direct toggle -->
                <div class="flex items-center gap-2">
                  <span class="text-xs text-base-content/60 w-12 shrink-0">To</span>
                  <div class="join">
                    <button class="join-item btn btn-xs" :class="!msgIsDirect ? 'btn-primary' : 'btn-outline'" @click="msgIsDirect = false">Broadcast</button>
                    <button class="join-item btn btn-xs" :class="msgIsDirect ? 'btn-primary' : 'btn-outline'" @click="msgIsDirect = true">Direct</button>
                  </div>
                  <select x-show="msgIsDirect" class="select select-bordered select-xs flex-1" x-model="msgDirectTo">
                    <option value="" disabled>Select node…</option>
                    <template x-for="n in allMsgNodes()" :key="n.num">
                      <option :value="n.num" x-text="(n.user?.short_name || n.num) + ' — ' + (n.user?.long_name || '')"></option>
                    </template>
                  </select>
                  <span x-show="!msgIsDirect && msgDirectTo" class="text-xs text-base-content/50 italic cursor-pointer"
                        @click="msgIsDirect = true"
                        x-text="'→ ' + (nodeShortName(msgDirectTo) || msgDirectTo)"></span>
                </div>

                <!-- Channel -->
                <div class="flex items-center gap-2">
                  <span class="text-xs text-base-content/60 w-12 shrink-0">Ch</span>
                  <select class="select select-bordered select-sm" x-model="msgChannel">
                    <option value="0">0 — Primary</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option>
                  </select>
                </div>

                <!-- Reply indicator -->
                <div x-show="msgReplyId" class="flex items-center gap-1 text-xs text-base-content/60 bg-base-200 rounded px-2 py-1">
                  <span class="opacity-70">↩ Replying to</span>
                  <span class="font-semibold" x-text="nodeShortName(msgReplyFrom) || '?'"></span>
                  <button class="ml-auto btn btn-xs btn-ghost py-0 h-auto min-h-0 opacity-50" @click="msgReplyId = null; msgReplyFrom = null">✕</button>
                </div>

                <!-- @mention autocomplete -->
                <div class="relative">
                  <div x-show="mentionOpen" x-cloak
                       class="absolute bottom-full left-0 right-0 mb-1 bg-base-200 border border-base-300 rounded-box shadow-lg z-30 overflow-hidden">
                    <ul class="menu menu-xs p-1 max-h-48 overflow-y-auto">
                      <template x-for="(n, idx) in mentionedNodes()" :key="n.num">
                        <li><a :class="idx === mentionIdx ? 'active' : ''" @mousedown.prevent="selectMention(n)"
                               class="flex items-center gap-2">
                          <span class="contents" x-html="nodeAvatar(n.num, n.user?.short_name, 'sm')"></span>
                          <span class="font-mono font-semibold text-xs" x-text="'@' + (n.user?.short_name || '?')"></span>
                          <span class="text-base-content/50 text-xs truncate" x-text="n.user?.long_name || ''"></span>
                        </a></li>
                      </template>
                    </ul>
                  </div>
                  <textarea class="textarea textarea-bordered w-full" rows="4" x-model="msgText"
                            placeholder="Type a message… (@name to mention)"
                            x-ref="msgInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                            @keydown="handleMsgKeydown($event)" @input="handleMsgInput($event)"
                            @blur="$nextTick(() => { mentionOpen = false })"></textarea>
                </div>

                <!-- Quick emoji -->
                <div class="flex w-full">
                  <template x-for="em in msgEmojiSet" :key="em.e">
                    <button class="btn btn-sm btn-ghost text-xl px-0 flex-1" x-text="em.e" :title="em.t"
                            @click="insertAtCursor($refs.msgInput, em.e)"></button>
                  </template>
                </div>

                <!-- Send -->
                <div class="flex items-center gap-2">
                  <button class="btn btn-primary btn-sm"
                          :disabled="!msgText.trim() || (msgIsDirect && !msgDirectTo)"
                          @click="sendMessage()">Send</button>
                  <span class="text-success text-sm" x-show="msgSent" x-transition>Sent ✓</span>
                </div>

              </div>
            </div>
          </div>
          <div class="card bg-base-100 shadow flex flex-col min-h-0">
            <div class="card-body flex flex-col min-h-0">
              <h2 class="card-title shrink-0">Message Feed</h2>
              <div class="overflow-y-auto flex-1 min-h-0">
                <template x-for="m in displayMessages()" :key="'msg_' + (m._txKey || m.pktId || m.fromNum + '_' + m.ts)">
                  <div class="flex items-start gap-3 py-2"
                       :style="m.replyDepth > 0 ? `margin-left:${m.replyDepth * 2}rem` : ''"
                       :class="m.isReply ? 'pl-2' : 'border-t border-base-200'"
                       >
                    <span class="relative inline-block shrink-0 cursor-pointer"
                          :title="'Reply to ' + (m.fromShortName || nodeShortName(m.fromNum))"
                          @click="replyTo(m)">
                      <span class="contents" x-html="nodeAvatar(m.fromNum, m.fromShortName || nodeShortName(m.fromNum))"></span>
                      <span class="absolute top-0 right-0 -translate-y-1 translate-x-1 w-3.5 h-3.5 rounded-full flex items-center justify-center text-white text-[9px] font-bold leading-none pointer-events-none"
                            :class="m.direction === 'tx' ? 'bg-success text-white' : 'bg-info text-white'"
                            x-text="m.direction === 'tx' ? '↑' : '↓'">
                      </span>
                    </span>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-1.5 text-sm">
                        <span x-show="m.isReply" class="text-base-content/40" title="Reply">↩</span>
                        <span class="font-semibold text-base-content" x-text="m.fromLongName || nodeLongName(m.fromNum)"></span>
                        <span class="badge badge-xs" :class="m.broadcast ? 'badge-ghost' : 'badge-info'" x-text="m.broadcast ? 'BC' : 'DM'"></span>
                        <span x-show="m.hops != null" x-html="hopsBadge(m.hops)"></span>
                        <template x-for="d in (Array.isArray(m.src) ? m.src : (m.src ? [m.src] : []))" :key="d">
                          <span class="badge badge-xs badge-outline font-mono opacity-60" :title="d" x-text="deviceLabel(d)"></span>
                        </template>
                        <span x-show="m.rssi != null || m.snr != null" x-html="sigBars(m.rssi, m.snr)"></span>
                        <span class="ml-auto text-base-content/50 shrink-0" x-text="m.time"></span>
                        <template x-if="m.direction==='tx'">
                          <span class="shrink-0 flex items-center gap-1">
                            <span class="font-bold text-sm"
                                  :class="{
                                    'text-success':    m.ackStatus==='acked' || m.ackStatus==='confirmed',
                                    'text-success/60': m.ackStatus==='sent',
                                    'text-error':      m.ackStatus==='failed' || m.ackStatus==='no_ack',
                                    'text-warning':    m.ackStatus==='sending' || m.ackStatus==='retrying',
                                  }"
                                  x-text="m.ackStatus==='acked'                              ? '✓✓'
                                        : m.ackStatus==='failed' || m.ackStatus==='no_ack'  ? '✕'
                                        : m.ackStatus==='retrying'                           ? '↻'
                                        : m.ackStatus==='confirmed' || m.ackStatus==='sent'  ? '✓'
                                        : '…'"></span>
                            <span x-show="m.ackStatus==='acked' && m.ackFrom"
                                  class="font-mono text-xs text-success/70"
                                  x-text="nodeLabel(m.ackFrom)"></span>
                            <span x-show="m.ackStatus==='no_ack'"
                                  class="font-mono text-xs text-error/70"
                                  x-text="m.ackError || 'TIMEOUT'"></span>
                            <span x-show="m.ackStatus==='sent'"
                                  class="font-mono text-xs text-base-content/40">awaiting ACK…</span>
                          </span>
                        </template>
                      </div>
                      <div class="text-base text-base-content mt-0.5 break-words" x-text="m.text"></div>
                    </div>
                  </div>
                </template>
                <div x-show="messages.length===0" class="text-base-content/40 italic py-4">No messages yet…</div>
              </div>
            </div>
          </div>
        </div>
