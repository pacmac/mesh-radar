        <!-- ===================== RANGE TEST ===================== -->
        <div x-show="tab==='range'" class="flex flex-col gap-4">
          <!-- Control bar -->
          <div class="card bg-base-100 shadow">
            <div class="card-body py-3 gap-2">
              <div class="flex flex-wrap items-center gap-3">
                <!-- RX device filter pills -->
                <div class="join">
                  <button class="join-item btn btn-xs" :class="!rangeRxFilter ? 'btn-active' : 'btn-outline'"
                          @click="rangeRxFilter = ''">All</button>
                  <template x-for="dev in availableDevices" :key="dev.node_id">
                    <button class="join-item btn btn-xs"
                            :class="rangeRxFilter === dev.node_id ? 'btn-active' : 'btn-outline'"
                            @click="rangeRxFilter = dev.node_id"
                            x-text="deviceLabel(dev.node_id)"></button>
                  </template>
                </div>
                <!-- Sender node filter -->
                <template x-if="rangeLogNodes().length > 1">
                  <select class="select select-bordered select-xs" x-model.number="rangeNodeFilter">
                    <option value="">All nodes</option>
                    <template x-for="n in rangeLogNodes()" :key="n.num">
                      <option :value="n.num" x-text="n.name"></option>
                    </template>
                  </select>
                </template>
                <div class="flex-1"></div>
                <span class="loading loading-spinner loading-xs" x-show="rangeLoading"></span>
                <button class="btn btn-xs btn-outline" @click="loadRangeTest()">Refresh</button>
                <button class="btn btn-xs btn-outline btn-info" @click="exportRangeCsv()" :disabled="!filteredRangeLog().length">CSV</button>
                <button class="btn btn-xs btn-outline btn-error" @click="clearRangeTest()" :disabled="!rangeLog.length">Clear</button>
              </div>
              <!-- TX active strip — only when a sender test is running -->
              <template x-if="rangeTimer.active">
                <div class="flex items-center gap-2 text-sm border-t border-base-300 pt-2">
                  <span class="text-warning font-bold">⚡</span>
                  <span class="opacity-60">TX active —</span>
                  <span class="font-semibold" x-text="deviceLabel(rangeTimer.nodeId) || rangeTimer.nodeId"></span>
                  <span class="opacity-50">sending · auto-off in</span>
                  <span class="font-mono text-warning" x-text="rangeFmtCountdown(rangeTimer.remaining)"></span>
                  <button class="btn btn-xs btn-error ml-auto" @click="stopRangeTest()">Stop TX</button>
                </div>
              </template>
            </div>
          </div>
          <!-- Stats panel -->
          <template x-if="rangeStats()">
            <div class="flex flex-col gap-2">
              <!-- Antenna bar — only when a specific radio is selected -->
              <template x-if="rangeRxFilter && deviceConfigs[rangeRxFilter]">
                <div class="flex items-center gap-3 px-1 text-sm flex-wrap">
                  <span class="font-semibold opacity-70" x-text="deviceConfigs[rangeRxFilter]?.antenna_type || 'Unknown antenna'"></span>
                  <span class="badge badge-sm badge-outline" x-show="deviceConfigs[rangeRxFilter]?.gain_dbi != null" x-text="deviceConfigs[rangeRxFilter]?.gain_dbi + ' dBi'"></span>
                  <span class="badge badge-sm badge-outline badge-warning" x-show="deviceConfigs[rangeRxFilter]?.cable_loss_db" x-text="'−' + deviceConfigs[rangeRxFilter]?.cable_loss_db + ' dB cable'"></span>
                  <span class="badge badge-sm badge-outline badge-info" x-show="deviceConfigs[rangeRxFilter]?.tx_power_dbm != null" x-text="deviceConfigs[rangeRxFilter]?.tx_power_dbm + ' dBm TX'"></span>
                  <span class="badge badge-sm badge-outline badge-ghost" x-show="deviceConfigs[rangeRxFilter]?.lora_region" x-text="deviceConfigs[rangeRxFilter]?.lora_region + ' · ' + _loraFreqMHz(rangeRxFilter) + ' MHz'"></span>
                </div>
              </template>
              <div class="stats stats-horizontal shadow bg-base-100 w-full overflow-x-auto">
                <div class="stat"><div class="stat-title">Packets</div><div class="stat-value text-lg" x-text="rangeStats().count"></div><div class="stat-desc">range test rx</div></div>
                <div class="stat"><div class="stat-title">Best RSSI</div><div class="stat-value text-lg text-success" x-text="rangeStats().bestRssi + ' dBm'"></div><div class="stat-desc" x-text="'median ' + rangeStats().medianRssi + ' dBm'"></div></div>
                <div class="stat"><div class="stat-title">Best SNR</div><div class="stat-value text-lg text-info" x-text="rangeStats().bestSnr != null ? rangeStats().bestSnr + ' dB' : '–'"></div><div class="stat-desc" x-text="rangeStats().medianSnr != null ? 'median ' + rangeStats().medianSnr + ' dB' : 'no SNR data'"></div></div>
                <div class="stat"><div class="stat-title">Max range</div><div class="stat-value text-lg" x-text="rangeStats().maxDistKm != null ? rangeStats().maxDistKm + ' km' : '–'"></div><div class="stat-desc">of heard packets with position</div></div>
                <div class="stat"><div class="stat-title">Median excess loss</div><div class="stat-value text-lg" :class="rangeStats().medianExcessLoss != null && rangeStats().medianExcessLoss < 0 ? 'text-success' : 'text-warning'" x-text="rangeStats().medianExcessLoss != null ? rangeStats().medianExcessLoss + ' dB' : '–'"></div><div class="stat-desc">vs FSPL (−=better than theory)</div></div>
              </div>
            </div>
          </template>
          <!-- Charts -->
          <div class="card bg-base-100 shadow">
            <div class="card-body py-3 gap-4">
              <div class="flex flex-wrap gap-8 justify-center items-start">

                <!-- Polar range-bearing scatter -->
                <div class="flex flex-col items-center gap-1">
                  <span class="text-xs font-semibold opacity-50 uppercase tracking-wide">Range · Bearing</span>
                  <svg width="300" height="300" viewBox="0 0 300 300" class="overflow-visible">
                    <!-- Distance rings -->
                    <g x-html="rangeRingsSvg()"></g>
                    <!-- Cardinal spokes -->
                    <g stroke="currentColor" stroke-opacity="0.12" stroke-width="1">
                      <line x1="150" y1="28" x2="150" y2="272"/>
                      <line x1="28"  y1="150" x2="272" y2="150"/>
                      <line x1="67"  y1="67"  x2="233" y2="233"/>
                      <line x1="233" y1="67"  x2="67"  y2="233"/>
                    </g>
                    <!-- Cardinal labels -->
                    <text x="150" y="18"  text-anchor="middle" class="fill-current" style="font-size:10px;opacity:0.45">N</text>
                    <text x="284" y="154" text-anchor="start"  class="fill-current" style="font-size:10px;opacity:0.45">E</text>
                    <text x="150" y="290" text-anchor="middle" class="fill-current" style="font-size:10px;opacity:0.45">S</text>
                    <text x="16"  y="154" text-anchor="end"    class="fill-current" style="font-size:10px;opacity:0.45">W</text>
                    <!-- Data points -->
                    <g x-html="rangePointsSvg()"></g>
                    <!-- No data -->
                    <text x="150" y="156" text-anchor="middle" class="fill-current" style="font-size:12px;opacity:0.25" x-show="!rangeChartData().hasData">awaiting data</text>
                  </svg>
                </div>

                <!-- Azimuth RSSI ring -->
                <div class="flex flex-col items-center gap-1">
                  <span class="text-xs font-semibold opacity-50 uppercase tracking-wide">Signal by Bearing</span>
                  <svg width="300" height="300" viewBox="0 0 300 300">
                    <!-- Background ring -->
                    <circle cx="150" cy="150" r="128" fill="none" stroke="currentColor" stroke-opacity="0.08" stroke-width="57"/>
                    <!-- Bin arcs -->
                    <g x-html="rangeArcsSvg()"></g>
                    <!-- Cardinal labels -->
                    <text x="150" y="10"  text-anchor="middle" class="fill-current" style="font-size:10px;opacity:0.45">N</text>
                    <text x="292" y="154" text-anchor="start"  class="fill-current" style="font-size:10px;opacity:0.45">E</text>
                    <text x="150" y="296" text-anchor="middle" class="fill-current" style="font-size:10px;opacity:0.45">S</text>
                    <text x="8"   y="154" text-anchor="end"    class="fill-current" style="font-size:10px;opacity:0.45">W</text>
                    <!-- Center label -->
                    <text x="150" y="145" text-anchor="middle" class="fill-current" style="font-size:10px;opacity:0.4">avg</text>
                    <text x="150" y="160" text-anchor="middle" class="fill-current" style="font-size:10px;opacity:0.4">RSSI</text>
                    <!-- No data -->
                    <text x="150" y="156" text-anchor="middle" class="fill-current" style="font-size:12px;opacity:0.25" x-show="!rangeChartData().hasData">awaiting data</text>
                  </svg>
                </div>
              </div>

              <!-- RSSI colour scale -->
              <div class="flex items-center gap-2 justify-center text-xs opacity-50">
                <span>−130 dBm</span>
                <div style="background:linear-gradient(to right,hsl(0,80%,50%),hsl(60,80%,50%),hsl(120,80%,50%));width:100px;height:7px;border-radius:3px"></div>
                <span>−40 dBm</span>
                <span class="ml-3 opacity-60">weak → strong</span>
              </div>
            </div>
          </div>

          <!-- Log table -->
          <div class="card bg-base-100 shadow">
            <div class="card-body py-3">
              <div class="flex items-center gap-2 flex-wrap">
                <h2 class="card-title text-base">Range Test Log</h2>
                <span class="badge badge-neutral" x-text="filteredRangeLog().length"></span>
              </div>
              <div class="overflow-x-auto max-h-[60vh]">
                <table class="table table-zebra table-xs">
                  <thead class="sticky top-0 bg-base-100 z-10">
                    <tr><th>Time</th><th x-show="!rangeRxFilter">Via</th><th>Node</th><th>Seq</th><th>Dist (km)</th><th>Az (°)</th><th>RSSI (dBm)</th><th>SNR (dB)</th><th>Exp RSSI</th><th>Excess loss</th><th>Hops</th></tr>
                  </thead>
                  <tbody>
                    <template x-if="!filteredRangeLog().length">
                      <tr><td :colspan="rangeRxFilter ? 10 : 11" class="text-center py-8 opacity-30 italic">awaiting data</td></tr>
                    </template>
                    <template x-for="raw in filteredRangeLog()" :key="raw.id">
                      <tr x-data="{ e: rangeEnrich(raw) }">
                        <td class="font-mono text-xs" x-text="fmtAge(e.ts)"></td>
                        <td x-show="!rangeRxFilter" class="font-mono text-xs opacity-70" x-text="e.via"></td>
                        <td x-text="e.nodeName"></td>
                        <td class="font-mono text-xs" x-text="e.seq || '–'"></td>
                        <td x-text="e.distKm != null ? e.distKm.toFixed(1) : '–'"></td>
                        <td x-text="e.az != null ? e.az + '°' : '–'"></td>
                        <td class="font-mono"><span x-html="sigBars(e.rssi, e.snr)" class="mr-1"></span><span x-text="e.rssi ?? '–'"></span></td>
                        <td class="font-mono" x-text="e.snr ?? '–'"></td>
                        <td class="font-mono opacity-60" x-text="e.expectedRssi != null ? e.expectedRssi : '–'"></td>
                        <td class="font-mono font-semibold" :class="e.excessLoss == null ? '' : e.excessLoss <= 0 ? 'text-success' : e.excessLoss < 10 ? 'text-warning' : 'text-error'" x-text="e.excessLoss != null ? (e.excessLoss > 0 ? '+' : '') + e.excessLoss + ' dB' : '–'"></td>
                        <td x-text="e.hops != null ? e.hops : '–'"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
