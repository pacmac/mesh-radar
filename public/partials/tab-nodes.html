        <!-- ===================== NODES ===================== -->
        <div x-show="tab==='nodes'" class="flex-1 min-h-0 card bg-base-100 shadow flex flex-col overflow-hidden">
          <div class="card-body flex flex-col flex-1 min-h-0">
            <div class="flex items-center gap-3 flex-wrap">
              <h2 class="card-title">
                NodeDB
                <span class="badge badge-neutral" x-text="nodeCount"></span>
                <span class="text-xs font-normal opacity-50" x-show="nodeCount !== nodeTotal" x-text="'of ' + nodeTotal"></span>
              </h2>
              <select class="select select-xs select-bordered ml-auto"
                      @change="nodeSort.dir = parseInt($event.target.selectedOptions[0].dataset.dir); sortNodes($event.target.value, true)">
                <option value="last_heard" data-dir="-1">Most recent</option>
                <option value="snr"        data-dir="-1">Best signal</option>
                <option value="hops"       data-dir="1">Fewest hops</option>
                <option value="km"         data-dir="1">Nearest</option>
                <option value="long_name"  data-dir="1">Name A–Z</option>
              </select>
              <!-- Filters dropdown -->
              <details class="dropdown dropdown-end">
                <summary class="btn btn-xs btn-ghost gap-1.5 font-mono opacity-70 hover:opacity-100">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L13 10.414V17a1 1 0 01-.553.894l-4-2A1 1 0 018 15v-4.586L3.293 6.707A1 1 0 013 6V3z" clip-rule="evenodd"/></svg>
                  Filters
                  <span class="badge badge-sm badge-primary" x-show="activeFilterCount() > 0" x-text="activeFilterCount()"></span>
                </summary>
                <div class="dropdown-content z-20 p-3 shadow-lg rounded-box flex flex-col gap-2.5"
                     style="background:var(--fallback-b2,oklch(var(--b2)));border:1px solid var(--fallback-bc,oklch(var(--bc)/.15));min-width:14rem;margin-top:0.25rem">
                  <!-- Source -->
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-xs opacity-60 font-semibold uppercase tracking-wide">Source</span>
                    <div class="join">
                      <button class="join-item btn btn-xs" :class="nodeSource==='both' ? 'btn-primary' : 'btn-ghost opacity-50'" @click="setNodeSource('both')">Both</button>
                      <button class="join-item btn btn-xs" :class="nodeSource==='yagi' ? 'btn-warning' : 'btn-ghost opacity-50'" @click="setNodeSource('yagi')">YAGI</button>
                      <button class="join-item btn btn-xs" :class="nodeSource==='omni' ? 'btn-info' : 'btn-ghost opacity-50'" @click="setNodeSource('omni')">OMNI</button>
                    </div>
                  </div>
                  <div class="divider my-0"></div>
                  <!-- Max hops -->
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-xs opacity-60">Max hops</span>
                    <select class="select select-xs select-bordered" :value="nodeFilters.maxHops" @change="saveNodeFilter('maxHops', parseInt($event.target.value))">
                      <option value="99">Any</option>
                      <option value="0">Direct (0)</option>
                      <option value="1">≤ 1</option>
                      <option value="2">≤ 2</option>
                    </select>
                  </div>
                  <!-- Last heard -->
                  <div class="flex items-center justify-between gap-2">
                    <span class="text-xs opacity-60">Last heard</span>
                    <select class="select select-xs select-bordered" :value="nodeFilters.maxAge" @change="saveNodeFilter('maxAge', parseInt($event.target.value))">
                      <option value="0">Any</option>
                      <option value="1800">30 m</option>
                      <option value="3600">1 h</option>
                      <option value="21600">6 h</option>
                      <option value="86400">24 h</option>
                    </select>
                  </div>
                  <!-- Checkboxes -->
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="checkbox checkbox-xs" :checked="nodeFilters.namedOnly" @change="saveNodeFilter('namedOnly', $event.target.checked)">
                    <span class="text-xs">Named only</span>
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="checkbox checkbox-xs" :checked="nodeFilters.hasPos" @change="saveNodeFilter('hasPos', $event.target.checked)">
                    <span class="text-xs">Has position</span>
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="checkbox checkbox-xs checkbox-error" :checked="nodeFilters.hideMqtt" @change="saveNodeFilter('hideMqtt', $event.target.checked)">
                    <span class="text-xs">Hide MQTT</span>
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="checkbox checkbox-xs" :checked="nodeFilters.hasSignal" @change="saveNodeFilter('hasSignal', $event.target.checked)">
                    <span class="text-xs">RF signal</span>
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="checkbox checkbox-xs" :checked="nodeFilters.hasTelem" @change="saveNodeFilter('hasTelem', $event.target.checked)">
                    <span class="text-xs">Telemetry</span>
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="checkbox checkbox-xs" :checked="nodeFilters.msgOnly" @change="saveNodeFilter('msgOnly', $event.target.checked)">
                    <span class="text-xs">Messagable only</span>
                  </label>
                  <!-- Role sub-dropdown -->
                  <details class="dropdown dropdown-right">
                    <summary class="btn btn-xs btn-ghost w-full justify-between font-normal">
                      <span class="text-xs" x-text="nodeFilters.nodeRoles?.length ? 'Role: ' + nodeFilters.nodeRoles.length + ' selected' : 'Role: All'"></span>
                      <svg class="w-3 h-3 opacity-50" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                    </summary>
                    <ul class="dropdown-content z-30 menu p-2 shadow bg-base-200 rounded-box w-44 text-xs gap-0.5" style="margin-left:0.25rem">
                      <template x-for="role in ['CLIENT','CLIENT_BASE','CLIENT_MUTE','ROUTER','ROUTER_CLIENT','ROUTER_LATE','TRACKER','SENSOR','REPEATER']" :key="role">
                        <li>
                          <label class="flex items-center gap-2 cursor-pointer py-1">
                            <input type="checkbox" class="checkbox checkbox-xs"
                                   :checked="!nodeFilters.nodeRoles?.length || nodeFilters.nodeRoles.includes(role)"
                                   @change="toggleNodeRole(role, $event.target.checked)">
                            <span x-text="role.replace(/_/g,' ')"></span>
                          </label>
                        </li>
                      </template>
                    </ul>
                  </details>
                  <div class="divider my-0"></div>
                  <button class="btn btn-xs btn-ghost opacity-50 w-full" @click="resetNodeFilters()">Reset all</button>
                </div>
              </details>
            </div>
            <div class="flex-1 min-h-0 overflow-y-auto">
              <div class="flex flex-col gap-1 pt-1">
                <template x-for="group in groupedNodes()" :key="group.label">
                  <div>
                    <div x-show="group.showHeader"
                         class="px-1 pt-2 pb-0.5 text-xs font-bold uppercase tracking-wide text-base-content/60 select-none border-b border-base-300 mb-1"
                         x-text="group.label"></div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2">
                      <template x-for="n in group.nodes" :key="n.num">
                        <div class="card bg-base-100 border border-base-300 cursor-pointer hover:border-primary/40 hover:shadow-md transition-all relative"
                             @click="openNodeInfo(n)">
                          <!-- Signal bars — top-right corner -->
                          <span class="absolute top-2.5 right-2.5" x-html="sigBars(n.rssi, n.snr, 1.5)"></span>
                          <div class="card-body p-3 gap-2">
                            <!-- Avatar + name + freshness -->
                            <div class="flex items-center gap-2 min-w-0 pr-8">
                              <div class="relative shrink-0">
                                <span class="contents" x-html="nodeAvatar(n.num, n.user?.short_name)"></span>
                                <span x-show="n._new"
                                      class="absolute top-0 right-0 text-yellow-400 leading-none pointer-events-none select-none"
                                      style="font-size:0.7rem;transform:translate(30%,30%)"
                                      title="New node — first heard within 24h">★</span>
                              </div>
                              <div class="min-w-0 flex-1">
                                <div class="font-semibold text-sm leading-tight truncate"
                                     x-text="n.user?.long_name || n.user?.short_name || '–'"></div>
                                <div class="text-[10px] leading-tight mt-0.5"
                                     :class="n.last_heard == null ? 'text-base-content/30'
                                       : (Date.now()/1000 - n.last_heard) < 1800 ? 'text-base-content/40'
                                       : (Date.now()/1000 - n.last_heard) < 3600 ? 'text-warning/80'
                                       : 'text-error/60'"
                                     x-text="fmtAge(n.last_heard)"></div>
                              </div>
                            </div>
                            <!-- distance · device · hops -->
                            <div class="flex flex-wrap items-center gap-1">
                              <span x-show="nodeKm(n) != null"
                                    class="badge badge-xs badge-ghost"
                                    x-text="nodeKm(n)?.toFixed(1) + ' km'"></span>
                              <template x-for="devId in (n._devices || (n._device ? [n._device] : []))" :key="devId">
                                <span class="badge badge-xs badge-ghost font-mono"
                                      :style="deviceConfigs[devId]?.color ? `color:${themeColor(deviceConfigs[devId].color)}` : ''"
                                      x-text="deviceConfigs[devId]?.label || deviceLabel(devId)"></span>
                              </template>
                              <span class="contents" x-html="hopsBadge(nodeHops(n))"></span>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
