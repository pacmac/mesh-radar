<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mesh radar</title>
<script>
  (function() {
    var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'business' : 'corporate');
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      document.documentElement.setAttribute('data-theme', e.matches ? 'business' : 'corporate');
    });
  })();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%22.9em%22 font-size=%2220%22>📡</text></svg>">
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="app.js?v=20260624a"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<style>
  /* Reusable node avatar — set size via --sz custom property or modifier class.
     font-size is derived as 32% of --sz so 4-char names always fit. */
  .node-avatar {
    --sz: 2.25rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-weight: 700;
    color: white;
    width: var(--sz);
    height: var(--sz);
    font-size: calc(var(--sz) * 0.32);
    flex-shrink: 0;
    line-height: 1;
    user-select: none;
  }
  .node-avatar-sm { --sz: 1.75rem; }
  .node-avatar-lg { --sz: 2.75rem; }
  [x-cloak] { display: none !important; }
</style>
<link rel="stylesheet" href="style.css?v=20260619">
</head>
<body class="h-screen overflow-hidden bg-base-200">

<div class="drawer h-screen" :class="sidebarPinned ? 'lg:drawer-open' : ''" x-data="dashboard()" x-init="init()">
  <input id="nav-drawer" type="checkbox" class="drawer-toggle" x-model="drawerOpen" />

  <!-- ===================== OTA OVERLAY ===================== -->
  <div x-show="otaActive"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-50 flex flex-col items-center justify-center gap-4 bg-base-300/80 backdrop-blur-sm">
    <!-- Flashing -->
    <span class="loading loading-rings loading-lg text-warning" x-show="!otaDone && !otaError"></span>
    <p class="text-base-content font-semibold" x-show="!otaDone && !otaError">Flashing firmware…</p>
    <!-- Done -->
    <svg x-show="otaDone" xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
    <p x-show="otaDone" class="text-success font-semibold text-lg">Flash complete</p>
    <!-- Error -->
    <svg x-show="otaError" xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    <p x-show="otaError" class="text-error font-semibold text-lg">Flash failed</p>
    <p x-show="otaError" class="text-base-content/60 text-sm font-mono text-center max-w-xs" x-text="otaError || ''"></p>
    <button x-show="otaError" class="btn btn-sm btn-ghost mt-2" @click="otaActive = false; otaError = null">Dismiss</button>
    <!-- Shared: BLE addr + protocol + progress bar -->
    <p class="text-base-content/50 text-sm font-mono" x-show="!otaError" x-text="otaBleAddr || ''"></p>
    <p x-show="otaProtocol && !otaDone && !otaError" class="text-base-content/30 text-xs font-mono" x-text="otaProtocol || ''"></p>
    <div class="w-64 bg-base-200 rounded-full h-3 overflow-hidden" x-show="!otaDone && !otaError">
      <div class="bg-warning h-3 rounded-full transition-all duration-300" :style="`width:${otaPct}%`"></div>
    </div>
    <p class="text-base-content/70 text-sm font-mono" x-show="!otaDone && !otaError" x-text="otaPct + '%'"></p>
  </div>

  <!-- ===================== DRAWER CONTENT ===================== -->
  <div class="drawer-content flex flex-col h-screen overflow-hidden">

    <!-- Top navbar -->
    <div class="navbar min-h-0 py-1.5 bg-base-100 shadow-md sticky top-0 z-50 px-3">

      <!-- LEFT: sidebar toggle + rotator mode buttons -->
      <div class="flex-none flex items-center gap-2">
        <!-- Mobile hamburger -->
        <label for="nav-drawer" class="btn btn-square btn-ghost lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </label>
        <!-- Desktop expand (only when sidebar collapsed) -->
        <button class="btn btn-square btn-ghost hidden" :class="!sidebarPinned && 'lg:flex'"
                @click="sidebarPinned = true; persistSet('sidebarPinned', true)" title="Expand sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <!-- Rotator mode buttons (always visible when rotator known) -->
        <div class="flex items-center gap-1.5 pl-1" x-show="rotatorConnected || scanMode">
          <span class="inline-block w-1.5 h-1.5 rounded-full shrink-0"
                :class="rotatorConnected ? 'bg-success animate-pulse' : 'bg-error opacity-60'"></span>
          <div class="flex gap-0.5">
            <button class="btn btn-xs font-mono tracking-widest px-2"
                    :class="rotatorMode === 0 && !scanMode ? 'btn-outline btn-info' : 'btn-ghost opacity-40'"
                    :disabled="scanMode"
                    @click="setRotatorMode(0)">PASV</button>
            <button class="btn btn-xs font-mono tracking-widest px-2"
                    :class="rotatorMode === 1 && !scanMode ? 'btn-error' : 'btn-ghost opacity-40'"
                    :disabled="scanMode"
                    @click="setRotatorMode(1)">ACTV</button>
            <button class="btn btn-xs font-mono tracking-widest px-2"
                    :class="scanMode ? 'btn-warning btn-outline' : 'btn-ghost opacity-40'"
                    :disabled="!rotatorConnected || !rotatorDeviceId()"
                    @click="scanMode ? abortScan() : startScan()"
                    x-text="scanMode ? 'ABORT' : 'SCAN'"></button>
          </div>
        </div>
      </div>

      <!-- Mobile title + permanent spacer -->
      <div class="flex-1 flex items-center justify-center gap-3">
        <span class="text-base font-bold tracking-wide lg:hidden">mesh radar</span>
      </div>

      <!-- RIGHT: az readout + status badges -->
      <div class="flex-none flex items-center gap-2">
        <!-- Az readout -->
        <span class="font-mono text-xs tabular-nums hidden sm:inline"
              style="color:rgba(80,200,255,0.85)"
              x-show="rotatorStatus.az != null"
              x-text="Number(rotatorStatus.az).toFixed(1) + '°'"></span>
        <!-- BLE signal -->
        <div class="tooltip tooltip-bottom" :data-tip="signalQuality(primaryDevBleState.last_rx_rssi, primaryDevBleState.last_rx_snr).label + ' · SNR ' + (primaryDevBleState.last_rx_snr != null ? primaryDevBleState.last_rx_snr.toFixed(1) + ' dB' : 'n/a') + (primaryDevBleState.ble_rssi != null ? ' · BLE ' + primaryDevBleState.ble_rssi + ' dBm' : '')">
          <div class="flex items-center gap-1.5 px-2 py-1 rounded border" :class="primaryDevBleState.ble_state === 'ready' ? 'border-success/40' : 'border-error/40'">
            <svg width="16" height="13" viewBox="0 0 16 13" class="shrink-0">
              <rect x="0"  y="9"  width="3" height="4"  rx="0.8" :fill="signalBarFill(1)"/>
              <rect x="4"  y="6"  width="3" height="7"  rx="0.8" :fill="signalBarFill(2)"/>
              <rect x="8"  y="3"  width="3" height="10" rx="0.8" :fill="signalBarFill(3)"/>
              <rect x="12" y="0"  width="3" height="13" rx="0.8" :fill="signalBarFill(4)"/>
            </svg>
            <span class="text-xs font-bold tracking-widest" :class="primaryDevBleState.ble_state === 'ready' ? 'text-success' : 'text-error'" style="font-family:'Oxanium',sans-serif;font-size:0.62rem">BLE</span>
            <span class="inline-block w-1.5 h-1.5 rounded-full" :class="primaryDevBleState.ble_state === 'ready' ? 'bg-success animate-pulse' : 'bg-error'"></span>
          </div>
        </div>
        <!-- Per-device not-ready indicator — all devices shown in header -->
        <template x-for="dev in availableDevices.filter(d => devBleState(d.node_id) && devBleState(d.node_id) !== 'ready' && devBleState(d.node_id) !== 'idle')" :key="dev.node_id">
          <div class="tooltip tooltip-bottom" :data-tip="dev.node_id + ' — ' + devBleLabel(dev.node_id)"
               @click="setNav('devices')" style="cursor:pointer">
            <div class="badge badge-warning gap-1 text-xs animate-pulse">
              <span class="font-mono" x-text="deviceLabel(dev.node_id)"></span>
              <span x-text="devBleLabel(dev.node_id)"></span>
            </div>
          </div>
        </template>
        <div class="tooltip tooltip-bottom" data-tip="MQTT proxy to broker">
          <div class="badge badge-sm gap-1" :class="mqttProxy ? 'badge-success' : 'badge-ghost'">
            <span class="inline-block w-2 h-2 rounded-full" :class="mqttProxy ? 'bg-success-content animate-pulse' : ''"></span>
            MQTT
          </div>
        </div>
        <div class="badge badge-sm badge-info" x-text="(nodeCount || '–') + ' nodes'"></div>
        <template x-if="perfScore() != null">
          <div class="badge badge-sm font-mono cursor-pointer"
               :class="perfScore() < 5 ? 'badge-success' : perfScore() < 15 ? 'badge-warning' : 'badge-error'"
               :title="'RF efficiency: ' + Math.abs(perfScore()).toFixed(1) + ' dB below theoretical'"
               @click="setNav('perf')"
               x-text="'RF ' + (perfScore() > 0 ? '-' : '+') + Math.abs(perfScore()).toFixed(1) + 'dB'"></div>
        </template>
        <div class="badge badge-sm" :class="wsConnected ? 'badge-primary' : 'badge-ghost'" x-text="wsConnected ? 'live' : 'offline'"></div>
      </div>
    </div>

    <!-- Offline banner -->
    <div x-show="!serverReachable" x-transition class="bg-error text-error-content text-sm font-semibold text-center py-2 px-4 z-40">
      Bridge unreachable — retrying…
    </div>

    <!-- No device selected banner -->
    <div x-show="!activeNodeId && serverReachable" x-transition class="bg-warning text-warning-content text-sm font-semibold text-center py-2 px-4 z-40 cursor-pointer" @click="setNav('devices')">
      No device selected — go to Devices to connect
    </div>

    <!-- Main content — all tabs fill viewport, no page-level scroll -->
    <div class="flex-1 min-h-0 overflow-hidden">
      <div :class="tab==='radar' ? 'h-full flex flex-col' : 'h-full flex flex-col p-3 max-w-[1400px] w-full mx-auto'">

        <!-- include: tab-overview.html -->
        <!-- include: tab-radar.html -->
        <!-- include: tab-shared.html -->
        <!-- include: tab-nodes.html -->
        <!-- include: tab-cfg.html -->
        <!-- include: tab-perf.html -->
        <!-- include: tab-range.html -->
        <!-- include: tab-messages.html -->
        <!-- include: tab-devices.html -->

      </div>
    </div>

  </div>

  <!-- include: drawer-sidebar.html -->

</div>

<script src="/utils.js"></script>
<script>
  document.addEventListener('click', e => {
    document.querySelectorAll('details.dropdown[open]').forEach(d => {
      if (!d.contains(e.target)) d.removeAttribute('open');
    });
  });
</script>

</body>
</html>
